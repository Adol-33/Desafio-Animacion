<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="author" content="Adolfo Antequera">
    <meta name="description" content="Pagina de tatuajes">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <title>Adolfo Tattoo</title>

</head>

<style>
    #modalRedes {
        margin: auto;
        border: none;
        border-radius: 8px;
        padding: 1em;
        width: clamp(50%, 90%, 100%);
        height: 7em;
        color: var(--color-2);
        background-color: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(10px); /* difuminado interno */
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 2em;
    }
    /* Centrado automático del <dialog> */
    #modalRedes::backdrop {
        background: rgba(0, 0, 0, 0.4); /* oscurece */
        backdrop-filter: blur(5px); /* difumina el fondo */
    }
    #modalRedes i {
        font-size: 2em;
    }
    #modalRedes button {
        position: absolute;
        top: 10px;
        right: 10px;
        color: var(--color-2);
        background-color: var(--color-3);
        padding: .2em .5em;
        border: none;
        border-radius: 4px;
    }

    @media (min-width: 992px) {
        #modalRedes {
        width: clamp(10%, 25%, 100%);
    }
    }
</style>
<body>
    <dialog id="modalRedes">
        <a href="https://www.facebook.com/adolfo.antequera" target="_blank"><i class="fa-brands fa-square-facebook"></i></a>
        <a href="https://www.instagram.com/adolfotattoo/" target="_blank"><i class="fa-brands fa-instagram"></i></a>
        <a href="#"><i class="fa-brands fa-whatsapp"></i></a>
        <form method="dialog">
            <button id="cerrarRedes">X</button>
        </form>
    </dialog>

    <script src="index.js"></script>
</body>
</html>
