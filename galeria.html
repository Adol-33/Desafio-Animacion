<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="author" content="Adolfo Antequera">
    <meta name="description" content="Pagina de tatuajes">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adolfo Tattoo</title>
<!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css">

    <style>
        body {
            width: 100%;
            height: 100%;
        }
        header {
            width: 100%;
            height: auto;
            text-align: center;
            color: var(--color-2);
            background-color: var(--color-4);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            position: sticky;
            top: 0;
            left: 0;
        }
        header a {
            position: absolute;
            top: 10px;
            left: 10px;
        }
        .galeria {
            width: 100%;
            height: 100%;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center;
            gap: 3em;
            padding: 1em;
            margin: auto;
            background-color: #333;
            background-image: url("assets/img/fondo-1.png");
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
        }
        
        .g-card img {
            max-width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center center;
        }
        .g-card h3 {
            width: 100%;
            height: auto;
            text-align: center;
            padding: .5em;
            color: var(--color-2);
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html">Volver</a>
        <h1>Galeria</h1>
    </header>
    <div class="galeria">
        <div class="g-card">
            <img src="assets/img/galeria-1.jpg" alt="Tatuaje romano">
            <h3>Descripción</h3>
        </div>
        <div class="g-card">
            <img src="assets/img/galeria-2.jpg" alt="Tatuaje romano segunda sesion">
            <h3>Descripción</h3>
        </div>
        <div class="g-card">
            <img src="assets/img/galeria-3.jpg" alt="Tatuaje espalda">
            <h3>Descripción</h3>
        </div>
        <div class="g-card">
            <img src="assets/img/galeria-4.jpg" alt="Tatuaje viajes">
            <h3>Descripción</h3>
        </div>
        <div class="g-card">
            <img src="assets/img/galeria-5.jpg" alt="Tatuaje geometrico">
            <h3>Descripción</h3>
        </div>
    </div>
    

    <script src="index.js"></script>
</body>
</html>
